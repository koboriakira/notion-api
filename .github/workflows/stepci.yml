name: StepCI

on:
  workflow_dispatch:
  # push:

jobs:
  test:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install -g stepci

      - name: run stepci
        run: |
          stepci run --workflow stepci_workflow.yml --secrets NOTION_SECRET=$NOTION_SECRET
        env:
          NOTION_SECRET: ${{ secrets.NOTION_SECRET }}
